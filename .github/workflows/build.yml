name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # Checkout repo
    - uses: actions/checkout@v4

    # Setup Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Setup Flutter
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    # Clone a working Flutter template (THIS IS THE KEY FIX)
    - name: Get Clean Flutter Project
      run: git clone https://github.com/flutter/samples.git

    - name: Use template
      run: |
        mv samples/hello_world app

    # Replace your code
    - name: Replace main.dart
      run: cp app_code.dart app/lib/main.dart

    # Install dependencies
    - name: Pub Get
      run: |
        cd app
        flutter pub get

    # Build APK
    - name: Build APK
      run: |
        cd app
        flutter build apk --debug

    # Upload APK
    - uses: actions/upload-artifact@v4
      with:
        name: roll-easy-apk
        path: app/build/app/outputs/flutter-apk/app-debug.apk
