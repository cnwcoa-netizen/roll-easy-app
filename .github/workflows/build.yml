name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # Checkout repo
    - uses: actions/checkout@v4

    # Setup Java 17 (required)
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Setup Flutter
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    # Install Android SDK components manually
    - name: Install Android SDK
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    # Create clean Flutter project
    - name: Create Project
      run: flutter create app

    # Replace code
    - name: Copy Code
      run: cp app_code.dart app/lib/main.dart

    # Replace pubspec
    - name: Copy Pubspec
      run: cp pubspec.yaml app/pubspec.yaml

    # Clean build (important)
    - name: Clean Project
      run: |
        cd app
        flutter clean

    # Get dependencies
    - name: Pub Get
      run: |
        cd app
        flutter pub get

    # Build APK (safe mode)
    - name: Build APK
      run: |
        cd app
        flutter build apk --debug --no-shrink

    # Upload APK
    - uses: actions/upload-artifact@v4
      with:
        name: roll-easy-apk
        path: app/build/app/outputs/flutter-apk/app-debug.apk
