name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # Checkout repo
    - uses: actions/checkout@v4

    # Install Flutter (LATEST STABLE)
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    # Verify installation
    - run: flutter doctor

    # Create fresh project
    - run: flutter create app

    # Replace main.dart
    - run: cp app_code.dart app/lib/main.dart

    # Replace pubspec.yaml
    - run: cp pubspec.yaml app/pubspec.yaml

    # Install dependencies
    - run: |
        cd app
        flutter pub get

    # Build APK (DEBUG first - more stable)
    - run: |
        cd app
        flutter build apk --debug

    # Upload APK
    - uses: actions/upload-artifact@v4
      with:
        name: roll-easy-apk
        path: app/build/app/outputs/flutter-apk/app-debug.apk
