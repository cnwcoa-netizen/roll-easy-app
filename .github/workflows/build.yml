name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # Checkout repo
    - uses: actions/checkout@v4

    # Setup Java (Gradle requirement)
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Setup Flutter (includes Android SDK)
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    # Verify environment
    - name: Flutter Doctor
      run: flutter doctor -v

    # Create clean Flutter project
    - name: Create Project
      run: flutter create app
    - name: Set App Name
      run: |
        sed -i 's/android:label="app"/android:label="Roll Easy"/' app/android/app/src/main/AndroidManifest.xml

    # Replace main.dart
    - name: Copy Code
      run: cp app_code.dart app/lib/main.dart

    # FIX: Force correct Android SDK versions
    - name: Fix Android Config
      run: |
        sed -i 's/minSdkVersion 16/minSdkVersion 21/' app/android/app/build.gradle
        sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/' app/android/app/build.gradle || true
        sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/' app/android/app/build.gradle || true

    # Install dependencies
    - name: Pub Get
      run: |
        cd app
        flutter pub get

    # Clean project
    - name: Clean
      run: |
        cd app
        flutter clean

    # Build APK (SAFE MODE)
    - name: Build APK
      run: |
        cd app
        flutter build apk --debug --no-tree-shake-icons

    # Upload APK
    - uses: actions/upload-artifact@v4
      with:
        name: roll-easy-apk
        path: app/build/app/outputs/flutter-apk/app-debug.apk
