name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # Checkout code
    - uses: actions/checkout@v4

    # Setup Java (required for Gradle)
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Setup Flutter (this also sets up Android SDK internally)
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    # Verify setup
    - run: flutter doctor

    # Create fresh Flutter project (v2 embedding ensured)
    - name: Create Project
      run: flutter create app

    # Replace main.dart
    - name: Copy Code
      run: cp app_code.dart app/lib/main.dart

    # Replace pubspec.yaml
    - name: Copy Pubspec
      run: cp pubspec.yaml app/pubspec.yaml

    # Install dependencies
    - name: Pub Get
      run: |
        cd app
        flutter pub get

    # Clean build (important)
    - name: Clean
      run: |
        cd app
        flutter clean

    # Build APK
    - name: Build APK
      run: |
        cd app
        flutter build apk --debug

    # Upload APK
    - uses: actions/upload-artifact@v4
      with:
        name: roll-easy-apk
        path: app/build/app/outputs/flutter-apk/app-debug.apk
