name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # Checkout code
    - uses: actions/checkout@v4

    # Setup Java (VERY IMPORTANT)
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Setup Flutter
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    # Accept Android licenses (CRITICAL FIX)
    - name: Accept Licenses
      run: yes | flutter doctor --android-licenses

    # Create clean project
    - name: Create Project
      run: flutter create app

    # Replace code
    - name: Copy Code
      run: cp app_code.dart app/lib/main.dart

    # Replace pubspec
    - name: Copy Pubspec
      run: cp pubspec.yaml app/pubspec.yaml

    # Install dependencies
    - name: Pub Get
      run: |
        cd app
        flutter pub get

    # Build APK (DEBUG SAFE MODE)
    - name: Build APK
      run: |
        cd app
        flutter build apk --debug

    # Upload APK
    - uses: actions/upload-artifact@v4
      with:
        name: roll-easy-apk
        path: app/build/app/outputs/flutter-apk/app-debug.apk
